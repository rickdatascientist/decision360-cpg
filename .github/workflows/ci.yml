name: Decision360 CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  static-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e .

      - name: Compile contracts and tests
        run: python -m compileall -q src tests

  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: python -m pip install -e .

      - name: Unit tests
        run: python -m unittest discover -s tests/unit -v

  component-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e .

      - name: Component tests
        run: python -m unittest discover -s tests/component -v

      - name: Integration tests
        run: python -m unittest discover -s tests/integration -v

  deterministic-benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e .

      - name: Enforce reference thresholds
        run: python -m decision360.benchmark --suite benchmarks/suite.json --output benchmark-report.json --fail-on-threshold
